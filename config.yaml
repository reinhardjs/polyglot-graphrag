# GraphRAG Engineering Knowledge System - local config
paths:
  data_dir: /mnt/data-970-plus/rag-system/data
  logs_dir: /mnt/data-970-plus/rag-system/logs

# LLM (answer synthesis) — config-driven in v2/config.py (SYNTHESIS_LLM_*).
# Legacy v1 reference: Gemma 4 E4B QAT Q4_0 on :8084 (was 12B on :8083).
llm:
  api_base: http://localhost:8084/v1
  api_key: not-needed
  model: gemma-4-E4B-it-QAT-Q4_0.gguf
  temperature: 0.1
  max_tokens: 1024
  # Reasoning models emit reasoning_content; we read `content` for the answer.
  system_prompt: |
    You are a senior engineering knowledge assistant. Use ONLY the provided
    context. If the context lacks the answer, say so plainly. Cite the source
    document for every claim. Be concise.

# Late-chunking embedding (local, long-context model).
# bge-m3 supports 8192-token context + returns token-level embeddings.
embedding:
  model: /mnt/data-970-plus/hf_cache/bge-m3-flat      # BAAI/bge-m3 (local)
  vector_dim: 1024
  late_chunk: true
  batch_size: 8

# Zero-shot routing (cheap, CPU)
router:
  model: /mnt/data-970-plus/hf_cache/minilm-flat      # all-MiniLM-L6-v2 (local)
  vector_intent_label: vector   # direct facts / specific tickets
  graph_intent_label: graph     # system themes / multi-hop impact
  threshold: 0.0                # sim above which we pick the higher path

# Cross-encoder rerank (CPU)
reranker:
  model: /mnt/data-970-plus/hf_cache/bge-reranker-flat  # BAAI/bge-reranker-base (local)
  keep_top: 0.5                 # keep top 50%, discard bottom 50%

# Retrieval
retrieval:
  top_k: 8                      # candidates fetched before rerank
  graph_top_k: 8                # nodes pulled in 2-hop traversal

# Qdrant collections
qdrant:
  chunks_collection: engineering_chunks      # BinaryQuantized dense + sparse
  cache_collection: query_cache              # semantic cache (dense)
  binary_quantization: true

# Neo4j graph
neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: ragpassword123

# Ingestion
ingest:
  supported_ext: [.txt, .md, .markdown, .pdf]
  doc_metadata_defaults:
    author: unknown
    doc_type: unknown
