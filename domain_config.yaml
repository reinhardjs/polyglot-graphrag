dynamic_labels:
  enabled: true
  max_per_domain: 20
  promotion_threshold: 3
  ttl_docs: 50
llm_fallback:
  enabled: false
  second_pass: true
  min_dropped: 1
domains:
  engineering:
    collection: engineering_chunks
    neo4j_label: Engineering
    entity_types:
    - Microservice
    - Database
    - API
    - Metric
    - Developer
    - Framework
    - Component
    - Bug
    - PR
    - ADR
    relation_types:
    - FIXES
    - AUTHORED
    - REFERENCES
    - IMPACTS
    - DEPENDS_ON
    - REVIEWED
    pair_strategy: all_pairs
    min_confidence: 0.6
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - author
      - doc_type
  legal:
    collection: legal_chunks
    neo4j_label: Legal
    entity_types:
    - Statute
    - Case
    - Regulation
    - Court
    - Party
    - Citation
    - Clause
    - Jurisdiction
    - Agency
    relation_types:
    - CITES
    - OVERRULES
    - AMENDS
    - INTERPRETS
    - APPLIES_TO
    - GOVERNS
    - REFERENCES
    - SUPERSEDES
    pair_strategy: same_sentence
    min_confidence: 0.6
    chunking:
      strategy: paragraph
      chunk_size: 512
      overlap: 50
    metadata_schema:
      fields:
      - jurisdiction
      - court
      - date
  medical:
    collection: medical_chunks
    neo4j_label: Medical
    entity_types:
    - Symptom
    - Diagnosis
    - Disease
    - Medication
    - Procedure
    - LabTest
    - Anatomy
    - Patient
    - Doctor
    relation_types:
    - TREATS
    - CAUSES
    - INDICATES
    - CONTRAINDICATES
    - PRESCRIBED_FOR
    - DOSAGE
    - ADMINISTERED_BY
    pair_strategy: all_pairs
    min_confidence: 0.65
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - patient_id
      - report_date
  accounting:
    collection: accounting_chunks
    neo4j_label: Accounting
    entity_types:
    - Account
    - Transaction
    - Ledger
    - TaxCode
    - Invoice
    - Vendor
    - Customer
    - Payment
    - JournalEntry
    relation_types:
    - DEBITS
    - CREDITS
    - POSTS_TO
    - REFERENCES
    - PAYS
    - OWES
    - APPLIES_TO
    - RECONCILES
    pair_strategy: same_sentence
    min_confidence: 0.6
    chunking:
      strategy: paragraph
      chunk_size: 512
      overlap: 50
    metadata_schema:
      fields:
      - fiscal_year
      - entity_name
  hospitality:
    collection: hospitality_chunks
    neo4j_label: Hospitality
    entity_types:
    - Recipe
    - Ingredient
    - Station
    - Dish
    - Supplier
    - Equipment
    - Procedure
    - Menu
    - Staff
    relation_types:
    - CONTAINS
    - PREPARED_BY
    - SOURCED_FROM
    - REQUIRES
    - SERVED_WITH
    - REPLACES
    - PAIRS_WITH
    pair_strategy: all_pairs
    min_confidence: 0.55
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - venue
      - meal_period
  journal:
    collection: journal_chunks
    neo4j_label: Journal
    extraction:
      prompt: |
        Extract a knowledge graph from the academic paper below. This is a
        research article, not software engineering — extract scholarly entities
        EXACTLY as they appear in the text (do NOT translate or generalize).
        Entity types to extract:
          Person, Organization, Model, Dataset, Method, Algorithm, Framework,
          Metric, Theory, Institution, Author
        Relationship types to extract:
          PROPOSES, EVALUATES, OUTPERFORMS, USES, REPORTS, SUPPORTS,
          CONTRADICTS, CITES, TRAINED_ON, INTRODUCES
        Examples of GOOD entities: "RAPTOR", "recursive summarization",
        "GPT-4", "QASPER", "BM25", "DPR", "Stanford University", "cluster",
        "tree structure", "abstractive summarization", "bilevel optimization".
        Extract concrete concepts, methods, models, datasets, and algorithms —
        not just authors. Aim for breadth: a methods/results section should
        yield many entities.
        Return ONLY valid JSON, no prose, no markdown:
        {{"nodes":[{{"id":"ExactEntityName","type":"Person|Organization|Model|Dataset|Method|Algorithm|Framework|Metric|Theory|Institution|Author"}}],"edges":[{{"source":"entity_a","target":"entity_b","type":"PROPOSES|EVALUATES|OUTPERFORMS|USES|REPORTS|SUPPORTS|CONTRADICTS|CITES|TRAINED_ON|INTRODUCES"}}]}}
        Document ({doc_id}):
        {text}
    entity_types:
    - Person
    - Organization
    - Model
    - Dataset
    - Method
    - Algorithm
    - Framework
    - Metric
    - Theory
    - Institution
    - Author
    relation_types:
    - PROPOSES
    - EVALUATES
    - OUTPERFORMS
    - USES
    - REPORTS
    - SUPPORTS
    - CONTRADICTS
    - CITES
    - TRAINED_ON
    - INTRODUCES
    pair_strategy: all_pairs
    min_confidence: 0.6
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - venue
      - year
      - doi
  snomed:
    # SNOMED CT terminology graph. Retrieval = symptom keyword term-matching
    # against SnomedDescription.term with IDF weighting (domains/snomed/retrieve.py).
    # The `clinical_prose` collection (separate domain) carries the free-text
    # disease descriptions that SNOMED lacks, enabling semantic differential
    # diagnosis. /ask for domain=snomed runs BOTH retrievers and merges.
    collection: null
    neo4j_label: SnomedConcept
    retrieval: snomed_term_match
    prose_domain: clinical_prose   # semantic companion corpus (optional)
    entity_types:
    - Disorder
    - Finding
    - Symptom
    - Morphology
    relation_types:
    - REL_246090004          # Associated finding (the diagnosis edge, sparse)
    - REL_47429007           # Associated with
    - REL_363702006          # Has definitional manifestation
    - REL_116680003          # IS-A hierarchy (used for taxonomy, not retrieval)
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: none
      chunk_size: 0
      overlap: 0
    metadata_schema:
      fields:
      - concept_id
      - term
  clinical_prose:
    # Free-text clinical knowledge (Wikipedia medicine articles, etc.) embedded
    # into Qdrant for SEMANTIC symptom->disease matching. SNOMED alone cannot
    # describe disease presentations; this corpus supplies the prose.
    # Ingested by domains/clinical_prose/ingest.py.
    collection: clinical_prose
    neo4j_label: null
    retrieval: dense_prose
    entity_types: []          # prose corpus: no graph extraction
    relation_types: []
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 512
      overlap: 64
    metadata_schema:
      fields:
      - title
      - source
      - url
default_domain: engineering
