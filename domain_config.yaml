dynamic_labels:
  enabled: true
  max_per_domain: 20
  promotion_threshold: 3
  ttl_docs: 50
llm_fallback:
  enabled: false
  second_pass: true
  min_dropped: 1
domains:
  engineering:
    collection: engineering_chunks
    neo4j_label: Engineering
    # REAL companion: the repo's docs/ tree (architecture, guides, roadmaps)
    # ingested into the `engineering_docs` Qdrant collection. The federated
    # factory runs engineering_chunks + the Engineering Neo4j graph + this
    # companion in parallel, tags each with `_signal`, and the cross-signal
    # dual-evidence boost fires when a candidate is confirmed by >=2 signals
    # (e.g. a graph entity AND a docs-prose passage). Remove to disable.
    companions:
      - engineering_docs
    entity_types:
    - Microservice
    - Database
    - API
    - Metric
    - Developer
    - Framework
    - Component
    - Bug
    - PR
    - ADR
    relation_types:
    - FIXES
    - AUTHORED
    - REFERENCES
    - IMPACTS
    - DEPENDS_ON
    - REVIEWED
    pair_strategy: all_pairs
    min_confidence: 0.6
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - author
      - doc_type
  legal:
    collection: legal_chunks
    neo4j_label: Legal
    entity_types:
    - Statute
    - Case
    - Regulation
    - Court
    - Party
    - Citation
    - Clause
    - Jurisdiction
    - Agency
    relation_types:
    - CITES
    - OVERRULES
    - AMENDS
    - INTERPRETS
    - APPLIES_TO
    - GOVERNS
    - REFERENCES
    - SUPERSEDES
    pair_strategy: same_sentence
    min_confidence: 0.6
    chunking:
      strategy: paragraph
      chunk_size: 512
      overlap: 50
    metadata_schema:
      fields:
      - jurisdiction
      - court
      - date
  medical:
    collection: medical_chunks
    neo4j_label: Medical
    entity_types:
    - Symptom
    - Diagnosis
    - Disease
    - Medication
    - Procedure
    - LabTest
    - Anatomy
    - Patient
    - Doctor
    relation_types:
    - TREATS
    - CAUSES
    - INDICATES
    - CONTRAINDICATES
    - PRESCRIBED_FOR
    - DOSAGE
    - ADMINISTERED_BY
    pair_strategy: all_pairs
    min_confidence: 0.65
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - patient_id
      - report_date
  accounting:
    collection: accounting_chunks
    neo4j_label: Accounting
    entity_types:
    - Account
    - Transaction
    - Ledger
    - TaxCode
    - Invoice
    - Vendor
    - Customer
    - Payment
    - JournalEntry
    relation_types:
    - DEBITS
    - CREDITS
    - POSTS_TO
    - REFERENCES
    - PAYS
    - OWES
    - APPLIES_TO
    - RECONCILES
    pair_strategy: same_sentence
    min_confidence: 0.6
    chunking:
      strategy: paragraph
      chunk_size: 512
      overlap: 50
    metadata_schema:
      fields:
      - fiscal_year
      - entity_name
  hospitality:
    collection: hospitality_chunks
    neo4j_label: Hospitality
    entity_types:
    - Recipe
    - Ingredient
    - Station
    - Dish
    - Supplier
    - Equipment
    - Procedure
    - Menu
    - Staff
    relation_types:
    - CONTAINS
    - PREPARED_BY
    - SOURCED_FROM
    - REQUIRES
    - SERVED_WITH
    - REPLACES
    - PAIRS_WITH
    pair_strategy: all_pairs
    min_confidence: 0.55
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - venue
      - meal_period
  journal:
    collection: journal_chunks
    neo4j_label: Journal
    extraction:
      prompt: |
        Extract a knowledge graph from the academic paper below. This is a
        research article, not software engineering — extract scholarly entities
        EXACTLY as they appear in the text (do NOT translate or generalize).
        Entity types to extract:
          Person, Organization, Model, Dataset, Method, Algorithm, Framework,
          Metric, Theory, Institution, Author
        Relationship types to extract:
          PROPOSES, EVALUATES, OUTPERFORMS, USES, REPORTS, SUPPORTS,
          CONTRADICTS, CITES, TRAINED_ON, INTRODUCES
        Examples of GOOD entities: "RAPTOR", "recursive summarization",
        "GPT-4", "QASPER", "BM25", "DPR", "Stanford University", "cluster",
        "tree structure", "abstractive summarization", "bilevel optimization".
        Extract concrete concepts, methods, models, datasets, and algorithms —
        not just authors. Aim for breadth: a methods/results section should
        yield many entities.
        Return ONLY valid JSON, no prose, no markdown:
        {{"nodes":[{{"id":"ExactEntityName","type":"Person|Organization|Model|Dataset|Method|Algorithm|Framework|Metric|Theory|Institution|Author"}}],"edges":[{{"source":"entity_a","target":"entity_b","type":"PROPOSES|EVALUATES|OUTPERFORMS|USES|REPORTS|SUPPORTS|CONTRADICTS|CITES|TRAINED_ON|INTRODUCES"}}]}}
        Document ({doc_id}):
        {text}
    entity_types:
    - Person
    - Organization
    - Model
    - Dataset
    - Method
    - Algorithm
    - Framework
    - Metric
    - Theory
    - Institution
    - Author
    relation_types:
    - PROPOSES
    - EVALUATES
    - OUTPERFORMS
    - USES
    - REPORTS
    - SUPPORTS
    - CONTRADICTS
    - CITES
    - TRAINED_ON
    - INTRODUCES
    pair_strategy: all_pairs
    min_confidence: 0.6
    chunking:
      strategy: sentence
      chunk_size: 384
      overlap: 0
    metadata_schema:
      fields:
      - venue
      - year
      - doi
  snomed:
    # SNOMED CT terminology graph. Retrieval = symptom keyword term-matching
    # against SnomedDescription.term with IDF weighting (domains/snomed/retrieve.py).
    # The `clinical_prose` collection carries the free-text disease descriptions
    # SNOMED lacks, enabling semantic differential diagnosis. /ask runs BOTH via
    # the federated factory (companions below) — no hardcoded domain branch.
    collection: null
    neo4j_label: SnomedConcept
    retrieval: snomed_term_match
    companions:
      - clinical_prose   # semantic companion corpus (optional)
    synthesis:
      kind: clinical_dx
    entity_types:
    - Disorder
    - Finding
    - Symptom
    - Morphology
    relation_types:
    - REL_246090004          # Associated finding (the diagnosis edge, sparse)
    - REL_47429007           # Associated with
    - REL_363702006          # Has definitional manifestation
    - REL_116680003          # IS-A hierarchy (used for taxonomy, not retrieval)
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: none
      chunk_size: 0
      overlap: 0
    metadata_schema:
      fields:
      - concept_id
      - term
  clinical_prose:
    # Free-text clinical knowledge (Wikipedia medicine articles, etc.) embedded
    # into Qdrant for SEMANTIC symptom->disease matching. SNOMED alone cannot
    # describe disease presentations; this corpus supplies the prose.
    # Ingested by domains/clinical_prose/ingest.py.
    collection: clinical_prose
    neo4j_label: null
    retrieval: dense_prose
    entity_types: []          # prose corpus: no graph extraction
    relation_types: []
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 512
      overlap: 64
    metadata_schema:
      fields:
      - title
      - source
      - url
  # ── TEMPLATE companion corpus (domains/example_companion) ───────────────
  # A self-contained example of a 2nd semantic corpus. Use it to learn the
  # companion pattern, OR copy domains/example_companion/ to add YOUR OWN
  # companion to any domain (list it under that domain's `companions:`).
  # It is wired as a companion of `engineering` above; querying
  # `domain=engineering` now exercises the generic >=2-signal dual-evidence
  # path outside the clinical domain.
  example_companion:
    collection: example_companion
    neo4j_label: null
    retrieval: dense_prose        # a companion is dense-prose only; never a primary graph signal
    entity_types: []             # prose corpus: no graph extraction
    relation_types: []
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 512
      overlap: 64
    metadata_schema:
      fields:
      - doc_id
      - doc_type
  # ── REAL engineering companion (repo docs/) ───────────────────────
  # The `engineering` domain's COMPANION: ingests the repo's `docs/` tree
  # (architecture, guides, roadmaps) into the `engineering_docs` Qdrant
  # collection. Distinct from the primary `engineering_chunks` (ingested by
  # sync_docs.py) — chunked LARGER (1024) so narrative passages survive,
  # giving semantic purchase on architecture/design questions the structured
  # `Engineering` graph (Microservice/Bug/PR entities) can't directly answer.
  # See domains/engineering_docs/ .
  engineering_docs:
    collection: engineering_docs
    neo4j_label: null          # prose-only companion: no graph extraction
    retrieval: dense_prose
    entity_types: []
    relation_types: []
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 1024
      overlap: 128
    metadata_schema:
      fields:
      - doc_id
      - doc_type
      - title
      - source
  # ── PUBLIC DEFAULT ALIAS ───────────────────────────────────────────────
  # `default` is a STABLE public name whose strategy IS `engineering`. We do
  # NOT rename `engineering` (referenced in ~50 places: config, tests,
  # hybrid_extraction, sync, etc.). Instead this alias lets a non-technical
  # user say `domain: default` (or send no domain at all — see default_domain
  # below) and transparently get the engineering retrieval strategy.
  # Resolve via domain_loader._resolve_alias() inside get_domain().
  default:
    alias: engineering
    display_name: "Default (Engineering)"
    description: >-
      The out-of-the-box domain. Uses the engineering knowledge graph
      (engineering_chunks + Engineering Neo4j label) with the standard
      dense+sparse hybrid retrieval. This is the strategy applied when no
      domain is specified.
# Default domain for unqualified `/ask` calls (no `domain` field sent).
# Now `default` (the alias above) → resolves to the `engineering` strategy.
# A non-technical user querying AS-IS gets engineering retrieval with zero setup.
default_domain: default
