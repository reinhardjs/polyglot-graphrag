dynamic_labels:
  enabled: true
  max_per_domain: 20
  promotion_threshold: 3
  ttl_docs: 50
llm_fallback:
  enabled: false
  second_pass: true
  min_dropped: 1

domains:
  enterprise:
    # Enterprise Knowledge Management: ADRs, runbooks, postmortems, RFCs.
    # DEFAULT domain (see default_domain below). Primary corpus = Qdrant
    # `enterprise` collection (dense prose) + a Neo4j graph (neo4j_label:
    # EnterpriseDoc) so entities/edges are extracted and queryable.
    collection: enterprise
    neo4j_label: EnterpriseDoc
    retrieval: dense_prose
    top_k: 12
    # Graph vocabulary for the enterprise KG (rendered into the extraction
    # prompt by ingest.py — single source of truth, do NOT hardcode in prompt).
    # Updated to match the actual self-docs corpus (technical docs about the
    # GraphRAG system itself: model configs, startup, architecture, API).
    entity_types: [Component, Service, Config, Parameter, Model, Binary, Port, Flag, Path, Library, Version, Environment, API, Process, Artifact, Server, Daemon, Client, Gateway, Database, Cache, Queue, Index, Store, Engine, Runtime, Kernel, Driver, Module, Package, Dependency, Release, Build, Container, Image, Volume, Network, Endpoint, Route, Handler, Middleware, Plugin, Extension, Hook, Event, Signal, Message, Stream, Buffer, Pool, Thread, Worker, Task, Job, Pipeline, Stage, Step, Phase, Layer, Tier, Zone, Region, Cluster, Node, Pod, Replica, Shard, Partition, Segment, Chunk, Block, Page, Frame, Window, Slice, Batch, Epoch, Iteration, Cycle, Round, Pass, Run, Trial, Experiment, Test, Benchmark, Profile, Metric, Log, Trace, Span, Alert, Alarm, Warning, Error, Exception, Fault, Failure, Crash, Hang, Leak, Overflow, Underflow, Race, Deadlock, Livelock, Starvation, Contention, Throttle, Limit, Quota, Cap, Ceiling, Floor, Boundary, Edge, Corner, Border, Margin, Pad, Gap, Hole, Void, "Null", Empty, Missing, Absent, Present, Active, Inactive, Enabled, Disabled, Running, Stopped, Paused, Resumed, Started, Restarted, Reloaded, Updated, Upgraded, Downgraded, Patched, Fixed, Broken, Repaired, Replaced, Removed, Added, Created, Destroyed, Allocated, Freed, Locked, Unlocked, Acquired, Released, Waited, Signaled, Notified, Broadcasted, Interrupted, Caught, Handled, Ignored, Logged, Reported, Metricized, Monitored, Observed, Watched, Tracked, Followed, Traced, Profiled, Sampled, Collected, Aggregated, Computed, Calculated, Derived, Inferred, Predicted, Estimated, Approximated, Bounded, Guaranteed, Proven, Verified, Validated, Tested, Checked, Asserted, Assumed, Required, Demanded, Expected, Optional, Mandatory, Conditional, Default, Fallback, Override, Custom, User, System, Admin, Root, Guest, Anonymous, Authenticated, Authorized, Permitted, Denied, Granted, Revoked, Expired, Renewed, Rotated, Refreshed, Cached, Invalidated, Evicted, Flushed, Synced, Replicated, Backedup, Restored, Migrated, Moved, Copied, Cloned, Forked, Branched, Merged, Rebases, Cherrypicked, Tagged, Labeled, Annotated, Documented, Commented, Reviewed, Approved, Rejected, Requested, Proposed, Discussed, Decided, Implemented, Deployed, Released, Shipped, Delivered, Installed, Configured, Provisioned, Bootstrapped, Initialized]
    relation_types: [CONFIGURES, RUNS_ON, DEPENDS_ON, REFERENCES, IMPLEMENTS, DEFINES, EXPOSES, STARTS, USES, VERSIONS]
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 512
      overlap: 64
    extraction_mode: hybrid  # GLiNER entities + E2B relations, 100% precision (recommended for ≤4K tokens)
    entry_strategy: vector
    synthesis:
      kind: enterprise_synthesis
    metadata_schema:
      fields:
      - title
      - source
  snomed:
    # SNOMED CT terminology graph. Retrieval = symptom keyword term-matching
    # against SnomedDescription.term with IDF weighting (domains/snomed/retrieve.py).
    # The `clinical_prose` collection carries the free-text disease descriptions
    # SNOMED lacks, enabling semantic differential diagnosis. /ask runs BOTH via
    # the federated factory (companions below) — no hardcoded domain branch.
    collection: null
    neo4j_label: SnomedConcept
    retrieval: snomed_term_match
    companions:
      - clinical_prose   # semantic companion corpus (optional)
    synthesis:
      kind: clinical_dx
    entity_types:
    - Disorder
    - Finding
    - Symptom
    - Morphology
    relation_types:
    - REL_246090004          # Associated finding (the diagnosis edge, sparse)
    - REL_47429007           # Associated with
    - REL_363702006          # Has definitional manifestation
    - REL_116680003          # IS-A hierarchy (used for taxonomy, not retrieval)
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: none
      chunk_size: 0
      overlap: 0
    metadata_schema:
      fields:
      - concept_id
      - term
  clinical_prose:
    # Free-text clinical knowledge (Wikipedia medicine articles, etc.) embedded
    # into Qdrant for SEMANTIC symptom->disease matching. SNOMED alone cannot
    # describe disease presentations; this corpus supplies the prose.
    # Ingested by domains/clinical_prose/ingest.py.
    collection: clinical_prose
    neo4j_label: null
    retrieval: dense_prose
    entity_types: []          # prose corpus: no graph extraction
    relation_types: []
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 512
      overlap: 64
    metadata_schema:
      fields:
      - title
      - source
      - url
  legal:
    # Legal & Compliance: GDPR, SOC 2, HIPAA, contract clauses.
    # Primary corpus = Qdrant `legal` collection (dense prose). No graph
    # (neo4j_label: null) -> retrieval-only; synthesis prompt is prompts/legal_synthesis.md.
    collection: legal
    neo4j_label: null
    retrieval: dense_prose
    # Retrieval-only: empty graph vocab (validator still requires the keys).
    # ingest.py falls back to config.DEFAULT_ENTITY_TYPES/RELATION_TYPES when a
    # domain omits them, so the extraction prompt stays valid even with no graph.
    entity_types: []
    relation_types: []
    synthesis:
      kind: legal_synthesis
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: fixed
      chunk_size: 512
      overlap: 64
    metadata_schema:
      fields:
      - title
      - source
    # To build a LEGAL GRAPH instead of retrieval-only: set neo4j_label: LegalDoc
    # and populate entity_types/relation_types (the extraction prompt reads them):
    #   entity_types: [Statute, Regulation, Clause, Party, Contract, Policy, Obligation]
    #   relation_types: [GOVERNS, REFERENCES, OVERRIDES, OBLIGATES, AMENDS, DEFINES]
    #   extraction:
    #     template: legal_extraction.md
  fraud:
    # Fraud Detection: transaction graph (Neo4j) + narrative companion (Qdrant).
    # Primary corpus = graph retriever (domains/fraud/retrieve.py). Companion
    # `fraud` Qdrant holds fraud-case writeups for dense semantic matching.
    collection: fraud
    neo4j_label: Account
    retrieval: fraud_graph
    companions:
      - fraud            # dense narrative companion (seeded fraud cases)
    entity_types:
    - Account
    - Transaction
    - Device
    - Card
    relation_types:
    - SHARED_DEVICE
    - SHARED_CARD
    - SENT
    - TO
    pair_strategy: all_pairs
    min_confidence: 0.0
    chunking:
      strategy: none
      chunk_size: 0
      overlap: 0
    metadata_schema:
      fields:
      - pattern
  # `healthcare` is a friendly public name for the SNOMED clinical domain
  # (so the v1.0 domain list reads healthcare/enterprise/fraud/legal).
  healthcare:
    alias: snomed
    display_name: "Healthcare (SNOMED)"
    description: >-
      Clinical diagnosis via SNOMED CT terminology graph + clinical_prose
      companion. Identical strategy to snomed; exposed as a clear public name.
  oraetlabora:
      # FOREIGN, CONFIDENTIAL corpus (kept in external/, git-ignored). Seeded
      # from a private engineering repo the user owns. Kept in its OWN domain so
      # it never pollutes the `enterprise` self-docs collection or the default
      # release-gate golden set. Source dir is external/ (git-ignored — never
      # committed). Do NOT add any document-specific names or content here.
      collection: oraetlabora
      neo4j_label: OraEtLabora
      retrieval: dense_prose
      entry_strategy: vector
      top_k: 50
      entity_types: [Product, Service, Component, Module, API, ADR, Bug, Guideline, Team, Document, Config]
      relation_types: [DOCUMENTS, OWNS, DEPENDS_ON, CAUSED_BY, REFERENCES, IMPLEMENTS, DESCRIBES, CONFIGURES]
      pair_strategy: all_pairs
      min_confidence: 0.0
      chunking:
        strategy: fixed
        chunk_size: 512
        overlap: 64
      synthesis:
        kind: enterprise_synthesis
      metadata_schema:
        fields:
        - title
        - source
# Default domain for unqualified `/ask` calls (no `domain` field sent).
# Explicit (no `default:` alias indirection) so it is unambiguous: a
# no-domain query hits `enterprise` — the populated, non-confidential primary
# corpus. SNOMED remains available via `domain: snomed` / `domain: healthcare`,
# but is NOT the implicit default (its data is confidential / access-controlled).
default_domain: enterprise
