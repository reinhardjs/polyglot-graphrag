# GraphRAG knowledge system - database services
# All data lives on <data-root>. Run from this dir:
#   docker compose up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - <data-root>/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.23
    environment:
      NEO4J_AUTH: neo4j/ragpassword123
      # cap heap so it fits alongside the 15GB multipass VM + Gemma on RAM
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 512M
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - <data-root>/neo4j_data/data:/data
      - <data-root>/neo4j_data/logs:/logs
      - <data-root>/neo4j_data/plugins:/plugins
      - <data-root>/neo4j_data/import:/import
      - <data-root>/neo4j_data/licenses:/licenses
    restart: unless-stopped
