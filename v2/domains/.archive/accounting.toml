# Accounting domain profile — accounts, transactions, ledgers, tax codes.

[domain]
name = "accounting"
collection = "accounting_chunks"
neo4j_label = "Accounting"
description = "Accounting knowledge base — accounts, transactions, ledgers, tax codes"

[chunking]
strategy = "paragraph"
chunk_size = 512
overlap = 32
section_header_prefix = "##"

[graph_schema]
entity_types = [
    "Account", "Transaction", "Ledger", "TaxCode",
    "Invoice", "Vendor", "Customer", "Payment", "JournalEntry",
]
edge_types = [
    "DEBITS", "CREDITS", "POSTS_TO", "REFERENCES",
    "PAYS", "OWES", "APPLIES_TO", "RECONCILES",
    "ASSOCIATED_WITH",
]

[extraction]
prompt = """
Extract an accounting knowledge graph from the document below.
Entities: extract names EXACTLY as they appear (account numbers, codes, etc.).
Relationships: use one of DEBITS, CREDITS, POSTS_TO, REFERENCES,
  PAYS, OWES, APPLIES_TO, RECONCILES, ASSOCIATED_WITH.
Return ONLY valid JSON, no prose, no markdown:
{"nodes":[{"id":"ExactEntityName","type":"Account|Transaction|Ledger|TaxCode|Invoice|Vendor|Customer|Payment|JournalEntry"}],"edges":[{"source":"entity_a","target":"entity_b","type":"DEBITS|CREDITS|POSTS_TO|REFERENCES|PAYS|OWES|APPLIES_TO|RECONCILES|ASSOCIATED_WITH"}]}
Document ({doc_id}):
{text}
"""

[synthesis]
role = "accounting knowledge assistant"
prompt = """
You are an accounting knowledge assistant. Use ONLY the provided ledgers,
transactions, and tax documents. Do NOT give financial advice — summarize what
the documents state and cite account numbers / tax codes where relevant. If the
context lacks the answer, say so plainly. Be precise and concise.

Context:
{context}

Question: {query}

Answer (cite accounts / tax codes; no financial advice):
"""

[metadata_schema]
fields = ["fiscal_year", "entity", "document_type", "period"]

[neo4j_entry]
strategy = "hybrid"
max_k_hops = 2
