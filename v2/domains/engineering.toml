# Engineering domain profile — captures the CURRENT (v2.5.0) default behavior.
# This is the fallback profile for any unknown domain. Edit to change the
# engineering KB's chunking / prompts / graph schema / metadata defaults.

[domain]
name = "engineering"
collection = "engineering_chunks"        # Qdrant collection name
neo4j_label = "Engineering"              # :Entity:Engineering label in Neo4j
description = "Engineering knowledge base — bugs, ADRs, PRs, components, services"

[chunking]
strategy = "sentence"                    # sentence | paragraph | section | fixed
chunk_size = 384                        # max tokens per chunk (approx)
overlap = 0                            # token overlap between chunks
section_header_prefix = "##"           # for section strategy

[graph_schema]
entity_types = [
    "Microservice", "Database", "API", "Metric",
    "Developer", "Framework", "Component", "Bug", "PR", "ADR",
]
edge_types = [
    "ASSOCIATED_WITH", "DEPENDS_ON", "IMPACTS",
    "AUTHORED", "REFERENCES", "FIXES",
]

[extraction]
# Sent to the EXTRACTION_LLM (E2B). {doc_id} and {text} are formatted in.
prompt = """
Extract a knowledge graph from the engineering document below.
Entities: extract names EXACTLY as they appear — do NOT translate.
  (e.g. 'Basis Data' stays 'Basis Data', 'Database' stays 'Database').
Relationships: use one of ASSOCIATED_WITH, DEPENDS_ON, IMPACTS,
  AUTHORED, REFERENCES, FIXES.
Return ONLY valid JSON, no prose, no markdown:
{"nodes":[{"id":"ExactEntityName","type":"Microservice|Database|API|Metric|Developer|Framework|Component|Bug|PR|ADR"}],"edges":[{"source":"entity_a","target":"entity_b","type":"ASSOCIATED_WITH|DEPENDS_ON|IMPACTS|AUTHORED|REFERENCES|FIXES"}]}
Document ({doc_id}):
{text}
"""

[synthesis]
# System prompt for the SYNTHESIS_LLM (E4B). {context} and {query} filled at runtime.
role = "senior engineering knowledge assistant"
prompt = """
You are a senior engineering knowledge assistant. Use ONLY the provided
context. If the context lacks the answer, say so plainly. Cite the source
document for every claim. Be concise.

Context:
{context}

Question: {query}

Answer (cite sources):
"""

[metadata_schema]
# Optional domain metadata fields stored in Qdrant payload.
fields = ["author", "doc_type"]

[neo4j_entry]
strategy = "keyword"                     # keyword | vector | hybrid
max_k_hops = 2                          # traversal depth from entry node
