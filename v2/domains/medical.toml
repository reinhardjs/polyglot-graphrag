# Medical domain profile — symptoms, diagnoses, medications, procedures.
# Neo4j label :Entity:Medical isolates medical entities from other domains.

[domain]
name = "medical"
collection = "medical_chunks"
neo4j_label = "Medical"
description = "Medical knowledge base — symptoms, diagnoses, medications, procedures"

[chunking]
strategy = "section"
chunk_size = 512
overlap = 64
section_header_prefix = "##"

[graph_schema]
entity_types = [
    "Symptom", "Diagnosis", "Disease", "Medication",
    "Procedure", "LabTest", "Anatomy", "Patient", "Doctor",
]
edge_types = [
    "TREATS", "CAUSES", "INDICATES", "CONTRAINDICATES",
    "DOSAGE", "PERFORMS", "PRESCRIBES", "AFFECTS",
    "ASSOCIATED_WITH",
]

[extraction]
prompt = """
Extract a medical knowledge graph from the clinical document below.
Entities: extract names EXACTLY as they appear — do NOT translate or normalize.
Relationships: use one of TREATS, CAUSES, INDICATES, CONTRAINDICATES,
  DOSAGE, PERFORMS, PRESCRIBES, AFFECTS, ASSOCIATED_WITH.
Return ONLY valid JSON, no prose, no markdown:
{"nodes":[{"id":"ExactEntityName","type":"Symptom|Diagnosis|Disease|Medication|Procedure|LabTest|Anatomy|Patient|Doctor"}],"edges":[{"source":"entity_a","target":"entity_b","type":"TREATS|CAUSES|INDICATES|CONTRAINDICATES|DOSAGE|PERFORMS|PRESCRIBES|AFFECTS|ASSOCIATED_WITH"}]}
Document ({doc_id}):
{text}
"""

[synthesis]
role = "medical information assistant"
prompt = """
You are a medical information assistant. Use ONLY the clinical documents provided.
Do NOT diagnose or give treatment advice for real patients — summarize what the
provided documents state. If the context lacks the answer, say so plainly.
Always cite the source document. Be concise and cautious.

Context:
{context}

Question: {query}

Answer (based on the clinical documents provided; cite sources):
"""

[metadata_schema]
fields = ["patient_id", "encounter_date", "department", "doctor", "document_type"]

[neo4j_entry]
strategy = "hybrid"
max_k_hops = 2
